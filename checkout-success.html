<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Redirecting…</title>
    <script>
        (function () {
            var q = new URLSearchParams(window.location.search);
            if (!q.has('source')) q.set('source', 'checkout');
            window.location.replace('payment-success.html?' + q.toString());
        })();
    </script>
</head>
<body>
    <p>Redirecting… <a href="payment-success.html">Continue</a></p>
</body>
</html>
